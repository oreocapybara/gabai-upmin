name: Format Check

on:
    pull_request:
        paths:
            - "app/**"
            - "components/**"
            - "hooks/**"
            - "lib/**"
            - "public/**"
            - "services/**"
            - "styles/**"
            - "types/**"
            - "next.config.ts"
            - "package.json"
            - "package-lock.json"
            - "postcss.config.mjs"
            - "tailwind.config.ts"
            - "tsconfig.json"
            - "eslint.config.mjs"
    push:
        branches:
            - main
        paths:
            - "app/**"
            - "components/**"
            - "hooks/**"
            - "lib/**"
            - "public/**"
            - "services/**"
            - "styles/**"
            - "types/**"
            - "next.config.ts"
            - "package.json"
            - "package-lock.json"
            - "postcss.config.mjs"
            - "tailwind.config.ts"
            - "tsconfig.json"
            - "eslint.config.mjs"

jobs:
    format:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Check Formatting
              run: npm run format
