name: Lint Check

on: 
  pull_request:
    branches:
    - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
      
      - name: install dependencies
        uses: npm ci

      - name: Run Linter
        uses: npm run lint